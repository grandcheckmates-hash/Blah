<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sophie's Treasure Safe</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="Treasure hunt safe">
      <div class="sparkles" aria-hidden="true"></div>

      <section class="safe-room" aria-live="polite">
        <div class="moon" aria-hidden="true"></div>
        <div class="shelf shelf-left" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div class="shelf shelf-right" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>

        <button class="date-clock" type="button" data-date-clock aria-label="Inspect date clock">
          <div class="clock-label">DATE</div>
          <div class="clock-display">
            <span data-date-preview="year">2026</span>
            <i></i>
            <span data-date-preview="month">06</span>
            <i></i>
            <span data-date-preview="day">02</span>
          </div>
        </button>

        <button class="safe" type="button" aria-label="Open safe dial" data-safe>
          <div class="safe-shadow" aria-hidden="true"></div>
          <div class="safe-body">
            <div class="safe-face">
              <div class="rivets" aria-hidden="true">
                <span></span><span></span><span></span><span></span>
              </div>
              <div class="safe-dial-mini" aria-hidden="true">
                <span></span>
              </div>
              <div class="safe-handle" aria-hidden="true"></div>
            </div>
          </div>
          <span class="safe-label">inspect safe</span>
        </button>
      </section>

      <div class="curtain" aria-hidden="true">
        <div class="curtain-top"></div>
        <div class="panel panel-left">
          <i></i><i></i><i></i><i></i><i></i><i></i>
        </div>
        <div class="panel panel-right">
          <i></i><i></i><i></i><i></i><i></i><i></i>
        </div>
      </div>
    </main>

    <section class="zoom" aria-hidden="true" data-zoom>
      <div class="zoom-backdrop"></div>
      <button class="close" type="button" aria-label="Zoom out" data-close>x</button>

      <div class="vault-panel">
        <div class="hint">The Code to the safe Is your name</div>
        <div class="progress" aria-label="Entered safe values" data-progress>
          <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>

        <div class="dial-zone">
          <div class="direction-pill" data-direction>clockwise</div>
          <div class="dial-wrap">
            <div class="dial-pointer" aria-hidden="true"></div>
            <button class="dial" type="button" aria-label="Safe dial" data-dial>
              <div class="dial-numbers" data-numbers aria-hidden="true"></div>
              <div class="dial-grip" aria-hidden="true">
                <span></span>
              </div>
              <div class="dial-center">
                <strong aria-hidden="true"></strong>
                <small>press</small>
              </div>
            </button>
          </div>
          <div class="feedback" data-feedback>Enter all six values.</div>
        </div>
      </div>
    </section>

    <section class="date-zoom" aria-hidden="true" data-date-zoom>
      <div class="zoom-backdrop"></div>
      <button class="close" type="button" aria-label="Zoom out from date clock" data-date-close>x</button>

      <div class="date-panel">
        <div class="clock-label">DATE</div>
        <div class="date-controls">
          <div class="date-unit">
            <button type="button" aria-label="Increase year" data-date-step="year" data-date-delta="1">^</button>
            <span data-date-value="year">2026</span>
            <button type="button" aria-label="Decrease year" data-date-step="year" data-date-delta="-1">v</button>
          </div>
          <div class="date-unit">
            <button type="button" aria-label="Increase month" data-date-step="month" data-date-delta="1">^</button>
            <span data-date-value="month">06</span>
            <button type="button" aria-label="Decrease month" data-date-step="month" data-date-delta="-1">v</button>
          </div>
          <div class="date-unit">
            <button type="button" aria-label="Increase day" data-date-step="day" data-date-delta="1">^</button>
            <span data-date-value="day">02</span>
            <button type="button" aria-label="Decrease day" data-date-step="day" data-date-delta="-1">v</button>
          </div>
        </div>
        <div class="clock-secret" data-clock-secret aria-hidden="true">
          <div class="clock-secret-door" aria-hidden="true"></div>
          <p>Mr. Century's First words as Toffee</p>
        </div>
      </div>
    </section>

    <section class="unlocked" aria-hidden="true" data-unlocked>
      <div class="opened-vault">
        <div class="vault-shell" aria-hidden="true"></div>
        <div class="vault-door" aria-hidden="true"></div>
        <button class="paper" type="button" data-paper aria-label="Read paper">
          <span></span>
        </button>
        <div class="note" data-note aria-hidden="true">
          <p>Googles Notebook Features Title Archive 1945</p>
          <strong>PAGUS SILINGUS</strong>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
